# Application Configuration
spring.application.name=soacocina
server.port=8085

# Neon PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://ep-silent-surf-am4qg976-pooler.c-5.us-east-1.aws.neon.tech/cocina_db?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_IRns5uLEkmJ6
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.com.donbelisario.cocina=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.info.env.enabled=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.donbelisario.cocina.controller

# Eureka (Service Discovery - opcional)
eureka.client.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Resilience4j
resilience4j.circuitbreaker.instances.cocina-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.cocina-service.minimum-number-of-calls=5